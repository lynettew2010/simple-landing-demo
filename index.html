<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Landing Page Demo</title>
<style>
body{margin:0;font-family:Arial;background:#ffffff;color:#222}
.hero{padding:100px 20px;text-align:center;background:linear-gradient(135deg,#6a5cff,#8f7cff);color:white}
.cta{background:white;color:#6a5cff;padding:15px 25px;border-radius:6px;display:inline-block;margin-top:20px;font-weight:bold}
section{padding:60px 20px;max-width:900px;margin:auto;text-align:center}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.feature{padding:20px;border:1px solid #eee;border-radius:10px}
</style>
</head>
<body>
<div class="hero">
<h1>Grow Your Business Faster</h1>
<p>High converting landing page example</p>
<a class="cta">Get Started</a>
</div>

<section>
<h2>Features</h2>
<div class="features">
<div class="feature">Fast Setup</div>
<div class="feature">Scalable</div>
<div class="feature">Easy to Maintain</div>
</div>
</section>

<section>
<h2>Call To Action</h2>
<p>This page demonstrates a typical marketing funnel layout.</p>
</section>

</body>
</html>
